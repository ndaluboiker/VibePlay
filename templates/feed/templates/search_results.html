{% extends 'base.html' %}
{% block content %}
<style>
    .search-res-wrap { padding: 80px 10px 20px; background: #000; min-height: 100vh; }
    .v-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .grid-item { aspect-ratio: 3/4; background: #111; overflow: hidden; position: relative; }
    .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    .search-query-head { color: #888; font-size: 14px; margin-bottom: 15px; padding-left: 5px; }
</style>

<div class="search-res-wrap">
    <div class="search-query-head">Results for "{{ query }}"</div>
    <div class="v-grid">
        {% for video in videos %}
        <div class="grid-item">
            <a href="{% url 'videos:feed_detail' video.id %}">
                <video src="{{ video.file.url }}" muted onmouseover="this.play()" onmouseout="this.pause();"></video>
            </a>
        </div>
        {% empty %}
        <div style="text-align:center; margin-top:50px; color:#555;">No vibes found.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
