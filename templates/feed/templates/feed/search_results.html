{% extends 'base.html' %}

{% block content %}
<style>
    .search-container-page { padding: 80px 10px 20px; }
    .search-title { font-size: 16px; color: #888; margin-bottom: 15px; }

    .v-grid {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 1.5px; padding-bottom: 80px;
    }
    .grid-item { position: relative; aspect-ratio: 3/4; background: #111; overflow: hidden; }
    .grid-item video { width: 100%; height: 100%; object-fit: cover; }

    .empty-state {
        text-align: center; margin-top: 100px; color: #555;
    }
</style>

<div class="search-container-page">
    <p class="search-title">Results for "{{ query }}"</p>

    <div class="v-grid">
        {% for video in videos %}
        <div class="grid-item">
            <a href="/">
                <video src="{{ video.file.url }}" muted onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;"></video>
            </a>
        </div>
        {% empty %}
        <div class="empty-state">
            <i class="fas fa-search-minus" style="font-size: 50px; margin-bottom: 15px;"></i>
            <p>No vibes found matching that search.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
