{% extends 'base.html' %}
{% block content %}
<div style="padding: 20px; color: white; background: #000; min-height: 100vh;">
    <h2>Results for "{{ query }}"</h2>

    {% if searched and not user_results and not video_results %}
        <div style="text-align: center; margin-top: 50px;">
            <h3>🚫 No users or videos found.</h3>
            <p>Try a different keyword or username.</p>
        </div>
    {% else %}
        {% for u in user_results %}
            <a href="{% url 'users:profile' u.username %}" style="display:flex; align-items:center; margin-bottom:15px; color:white; text-decoration:none;">
                <img src="{{ u.avatar.url }}" style="width:50px; height:50px; border-radius:50%; margin-right:15px;">
                <span>@{{ u.username }}</span>
            </a>
        {% endfor %}
    {% endif %}
</div>
{% endblock %}
