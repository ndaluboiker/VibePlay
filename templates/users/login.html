{% extends 'base.html' %}
{% block content %}

<style>
    .auth-wrapper {
        background-color: #ffffff;
        color: #000000;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .auth-card {
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .vibe-logo {
        color: #fe2c55;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: -1.5px;
        margin-bottom: 10px;
    }

    .auth-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        color: #616161;
        font-size: 15px;
        margin-bottom: 30px;
    }

    /* Styling the Django Form specifically */
    .django-form p {
        text-align: left;
        margin-bottom: 15px;
    }

    .django-form input {
        width: 100%;
        padding: 12px 15px;
        background-color: #f1f1f1;
        border: 1px solid #e3e3e3;
        border-radius: 4px;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
    }

    .django-form input:focus {
        border-color: #fe2c55;
    }

    .login-btn {
        width: 100%;
        background-color: #fe2c55;
        color: #ffffff;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
        transition: opacity 0.2s;
    }

    .login-btn:hover {
        opacity: 0.9;
    }

    .auth-footer {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #eeeeee;
        width: 100%;
        font-size: 15px;
    }

    .auth-footer a {
        color: #fe2c55;
        text-decoration: none;
        font-weight: 700;
    }

    .errorlist {
        color: #fe2c55;
        list-style: none;
        padding: 0;
        font-size: 14px;
        text-align: left;
        margin-bottom: 10px;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="vibe-logo">VIBEPIC</div>
        <h1 class="auth-title">Log in</h1>
        <p class="auth-subtitle">Manage your account, check notifications, and more.</p>

        <form method="POST" class="django-form">
            {% csrf_token %}

            {% if form.errors %}
                <ul class="errorlist">
                    <li>Your username and password didn't match. Please try again.</li>
                </ul>
            {% endif %}

            {{ form.as_p }}

            <button type="submit" class="login-btn">Log in</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'users:register' %}">Sign up</a>
        </div>
    </div>
</div>

{% endblock %}
