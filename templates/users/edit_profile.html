{% extends 'base.html' %}
{% block content %}
<div style="padding: 100px 20px; max-width: 400px; margin: 0 auto; color: white;">
    <h3 style="text-align: center;">Edit Profile</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="text-align: center; margin-bottom: 20px;">
            <label for="id_profile_pic" style="cursor: pointer;">
                {% if request.user.profile_pic %}
                    <img src="{{ request.user.profile_pic.url }}" id="imgPrev" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
                {% else %}
                    <div id="imgPrev" style="width:100px; height:100px; border-radius:50%; background:#333; margin:0 auto; display:flex; align-items:center; justify-content:center;">👤</div>
                {% endif %}
                <p style="color:var(--vp-cyan); font-size:12px; margin-top:5px;">Change Photo</p>
            </label>
            <input type="file" name="profile_pic" id="id_profile_pic" style="display:none;" onchange="document.getElementById('imgPrev').src = window.URL.createObjectURL(this.files[0])">
        </div>

        <p>Username</p>
        <input type="text" name="username" value="{{ request.user.username }}" style="width:100%; background:#222; border:none; padding:12px; color:white; border-radius:5px;">

        <p style="margin-top:15px;">Bio</p>
        <textarea name="bio" style="width:100%; background:#222; border:none; padding:12px; color:white; border-radius:5px;">{{ request.user.bio }}</textarea>

        <button type="submit" style="width:100%; background:var(--vp-red); color:white; border:none; padding:14px; font-weight:bold; border-radius:5px; margin-top:20px;">Save Changes</button>
    </form>
</div>
{% endblock %}
