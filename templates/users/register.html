{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 20px;
    }
    .auth-card {
        width: 100%; max-width: 350px; text-align: center;
    }
    .auth-input {
        width: 100%; padding: 12px; margin: 10px 0;
        background: #222; border: 1px solid #444; color: white; border-radius: 4px;
    }
    .auth-btn {
        width: 100%; padding: 12px; background: var(--vp-red);
        color: white; border: none; font-weight: bold; border-radius: 4px; margin-top: 10px;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h1 style="color:var(--vp-cyan); letter-spacing: -2px;">JOIN VIBEPLAY</h1>
        <p style="color:#888; margin-bottom: 20px;">Create an account to start vibing</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">
            Already have an account? <a href="{% url 'users:login' %}" style="color:var(--vp-cyan);">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
