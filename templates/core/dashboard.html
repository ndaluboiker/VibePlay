{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 100px;">
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="{{ user.profile_pic.url }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #FE2C55;">
        <h2 style="margin: 10px 0;">@{{ user.username }}</h2>
        <p style="color: #888;">{{ user.bio }}</p>
    </div>

    <div style="background: linear-gradient(45deg, #121212, #1a1a1a); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px;">
        <h4 style="color: #888; margin: 0;">Creator Earnings</h4>
        <h1 style="margin: 10px 0; font-size: 36px;">${{ user.balance }}</h1>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #25F4EE; font-weight: bold;">{{ user.coins }} Coins Available</span>
            <button class="btn-vibe" style="padding: 8px 15px; font-size: 12px;">WITHDRAW</button>
        </div>
    </div>

    <h3 style="border-bottom: 1px solid #222; padding-bottom: 10px;">My Vibes</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
        {% for video in videos %}
        <div style="aspect-ratio: 9/16; background: #111; overflow: hidden; border-radius: 4px;">
            <video src="{{ video.video_file.url }}" style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>
        {% empty %}
        <p style="grid-column: span 3; text-align: center; color: #555; padding-top: 40px;">No videos uploaded yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
